name: Required E2E Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  playwright:
    name: required-e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: required-e2e-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: ./scripts/pnpm.sh install
      - name: Start infra
        run: docker compose up -d
      - name: DB migrate
        run: ./scripts/pnpm.sh db:migrate
      - name: Install Playwright browsers
        run: ./scripts/pnpm.sh --filter @pub/web exec playwright install --with-deps chromium
      - name: Run E2E
        run: ./scripts/pnpm.sh run test:e2e:ci
