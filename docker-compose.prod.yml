name: publication-prod

services:
  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    env_file:
      - path: .env.prod
        required: false
      - path: .env.prod.secrets
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-pub}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pub} -d ${POSTGRES_DB:-pub}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 2G

  redis:
    image: redis:7.4.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    ports:
      - "${REDIS_PORT:-56379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file:
      - path: .env.prod
        required: false
      - path: .env.prod.secrets
        required: false
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
    ports:
      - "${MINIO_API_PORT:-59000}:9000"
      - "${MINIO_CONSOLE_PORT:-59001}:9001"
    volumes:
      - minio_data:/data

  api:
    image: ${API_IMAGE:-ghcr.io/example/publication-api:v1.0.0}
    restart: unless-stopped
    env_file:
      - path: .env.prod
        required: false
      - path: .env.prod.secrets
        required: false
    environment:
      NODE_ENV: production
      API_PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/api/v1/health/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 1G

  worker:
    image: ${WORKER_IMAGE:-ghcr.io/example/publication-worker:v1.0.0}
    restart: unless-stopped
    env_file:
      - path: .env.prod
        required: false
      - path: .env.prod.secrets
        required: false
    environment:
      NODE_ENV: production
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M

  web:
    image: ${WEB_IMAGE:-ghcr.io/example/publication-web:v1.0.0}
    restart: unless-stopped
    env_file:
      - .env.prod
      - .env.prod.secrets
    environment:
      NODE_ENV: production
      WEB_PORT: 3000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 1G

volumes:
  pg_data:
  redis_data:
  minio_data:
